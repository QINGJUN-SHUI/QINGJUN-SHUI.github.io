- title: Postdoctoral Researcher
  institution: Linköping University, Department of Physics, Chemistry and Biology (IFM)
  period: 2026-present
  summary: Organic optoelectronic materials and advanced organic functional devices.
  bullets:
  - Research interests include photovoltaic physics, electroluminescence, charge-transfer states, and triplet management.
  collaborators: Prof. Feng Gao
- title: Visiting Student
  institution: Osaka University, Osaka, Japan
  period: 2025.8-2025.10
  summary: Development of novel heptazine derivatives.
  bullets:
  - Heptazine derivatives have inverted singlet-triplet excited states and offer exciting prospects in photophysics and related organic semiconductors.
  collaborators: Prof. Naoya Aizawa
- title: Ph.D. Student
  institution: Institute of Science Tokyo / Tokyo Institute of Technology
  period: 2023.4-2026.3
  summary: UC-OLEDs, charge-transfer states, triplet management, and multifunctional organic diodes.
  bullets:
  - 'Multifunctional organic semiconductor devices: developed devices with suppressed non-radiative recombination losses, now published in Advanced Materials.'
  - 'Upconversion blue OLEDs: elucidated dopant-induced trap formation in UC-OLEDs and demonstrated narrow-band deep-blue emission at 1.5 V.'
  - High-efficiency UC-OLEDs through interfacial energy-transfer control.
  - 'Highly electroluminescent non-fullerene acceptor films: pushing the open-circuit voltage toward the Shockley-Queisser limit.'
  collaborators: Prof. Seiichiro Izawa
- title: Master Student
  institution: Nagoya University, Nagoya, Japan
  period: 2021.4-2023.3
  summary: Evaporable fullerene semiconductors and perovskite solar cells.
  bullets:
  - A new class of fullerene derivatives stable enough for thermal evaporation was developed.
  - tBu-FIDO effectively suppresses fullerene self-aggregation by introducing a bulky steric hindrance group.
  collaborators: Prof. Hao-Sheng Lin and Prof. Yutaka Matsuo
